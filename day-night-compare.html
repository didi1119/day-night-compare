<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>靜謐森林小屋｜白天夜間動態比對</title>
  <style>
    :root {
      --split: 0%;
      --ink: #f8f2e7;
      --muted: rgba(248, 242, 231, .72);
      --edge: rgba(255, 255, 255, .72);
      --shadow: rgba(0, 0, 0, .42);
      --panel: rgba(18, 22, 19, .5);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #0b100d;
      color: var(--ink);
      font-family: "Songti TC", "Noto Serif TC", Georgia, serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 36px);
      overflow-x: hidden;
    }

    .stage {
      width: min(100%, 1440px);
      display: grid;
      gap: 14px;
    }

    .viewer {
      position: relative;
      width: 100%;
      aspect-ratio: 1672 / 941;
      overflow: hidden;
      isolation: isolate;
      background: #111;
      box-shadow: 0 26px 80px var(--shadow);
      cursor: ew-resize;
      user-select: none;
      touch-action: none;
    }

    .viewer::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .26), transparent 18%, transparent 72%, rgba(0, 0, 0, .35)),
        radial-gradient(circle at 50% 18%, rgba(255, 246, 210, .18), transparent 36%);
      mix-blend-mode: soft-light;
    }

    .image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .night {
      z-index: 2;
      clip-path: inset(0 0 0 var(--split));
      filter: saturate(1.04) contrast(1.03);
    }

    .day {
      z-index: 1;
    }

    .handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--split);
      z-index: 5;
      width: 0;
      transform: translateX(-1px);
      pointer-events: none;
    }

    .handle::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--edge) 14%, #fff 50%, var(--edge) 86%, transparent);
      box-shadow: 0 0 20px rgba(255, 244, 200, .7), 0 0 1px rgba(0, 0, 0, .8);
    }

    .grip {
      position: absolute;
      top: 50%;
      left: 1px;
      width: clamp(42px, 5vw, 58px);
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, .74);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: rgba(12, 18, 15, .42);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .36), inset 0 0 0 1px rgba(255, 255, 255, .18);
      backdrop-filter: blur(10px);
    }

    .grip::before,
    .grip::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 9px;
      height: 9px;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
    }

    .grip::before {
      left: 14px;
      transform: translateY(-50%) rotate(-45deg);
    }

    .grip::after {
      right: 14px;
      transform: translateY(-50%) rotate(135deg);
    }

    .range {
      position: absolute;
      inset: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: ew-resize;
    }

    .caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-inline: 2px;
      font-size: clamp(13px, 1.4vw, 17px);
      letter-spacing: 0;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, .18);
      background: var(--panel);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .badge:last-child {
      margin-left: auto;
    }

    @media (max-width: 680px) {
      body {
        padding: 10px;
      }

      .stage {
        gap: 10px;
      }

      .caption {
        font-size: 13px;
      }

      .badge {
        min-height: 28px;
        padding: 5px 9px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="viewer" aria-label="白天與夜間動態比對">
      <img class="image day" src="assets/day-night-compare/day.png" alt="森林小屋白天畫面">
      <img class="image night" src="assets/day-night-compare/night.png" alt="森林小屋夜間畫面">
      <div class="handle" aria-hidden="true">
        <span class="grip"></span>
      </div>
      <input class="range" type="range" min="0" max="100" value="0" aria-label="調整夜間疊圖顯示範圍">
    </section>
    <div class="caption" aria-hidden="true">
      <span class="badge">白天</span>
      <span class="badge">夜間</span>
    </div>
  </main>

  <script>
    const viewer = document.querySelector(".viewer");
    const range = document.querySelector(".range");

    function setSplit(value) {
      const clamped = Math.min(100, Math.max(0, Number(value)));
      viewer.style.setProperty("--split", `${clamped}%`);
      viewer.dataset.split = String(clamped);
      range.value = clamped;
    }

    function updateFromPointer(event) {
      const rect = viewer.getBoundingClientRect();
      const position = ((event.clientX - rect.left) / rect.width) * 100;
      setSplit(position);
    }

    range.addEventListener("input", (event) => setSplit(event.target.value));

    viewer.addEventListener("pointerdown", (event) => {
      viewer.setPointerCapture(event.pointerId);
      updateFromPointer(event);
    });

    viewer.addEventListener("pointermove", (event) => {
      if (event.buttons !== 1) return;
      updateFromPointer(event);
    });

    viewer.addEventListener("pointerup", (event) => {
      if (viewer.hasPointerCapture(event.pointerId)) {
        viewer.releasePointerCapture(event.pointerId);
      }
    });

    setSplit(0);
  </script>
</body>
</html>
